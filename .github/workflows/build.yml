name: BUILD
run-name: ${{ github.actor }} build 🔨

on:
  push:
    branches:
      - '**'   # run on all branches

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: List build output
        run: ls -R dist || echo "No dist folder found"